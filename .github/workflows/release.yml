name: Release Nano OS

on:
  push:
    tags:
      - 'v*' # Trigger on any tag starting with 'v'

permissions:
  contents: write # Required for creating releases

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm gcc-multilib g++-multilib

      - name: Build Nano OS Raw Image
        run: |
          # Build target raw image directly, bypassing VBoxManage.
          # Override CC, CPP, and LD to compile via multilib i386 mode on the host.
          make build/nano_os.img CC="gcc -m32" CPP="g++ -m32" LD="ld -melf_i386"
          
          # Verify the image output
          ls -lh build/nano_os.img

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            build/nano_os.img
          draft: false
          prerelease: false
          generate_release_notes: true